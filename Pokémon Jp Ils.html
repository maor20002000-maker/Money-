<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ממיר שקל ⇄ יין | פוקימון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --poke-red:#ee1515;
    --poke-red-dark:#a80e0e;
    --poke-yellow:#ffcb05;
    --poke-yellow-dark:#b8960a;
    --poke-blue:#3b4cca;
    --poke-blue-dark:#28348f;
    --cream:#fff8e1;
    --ink:#1c1c1c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Heebo', sans-serif;
    background:
      radial-gradient(circle at 15% 15%, rgba(255,203,5,0.25), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(59,76,202,0.3), transparent 45%),
      linear-gradient(180deg, #2a2a72, #1c1c1c 70%);
    background-attachment:fixed;
    color:var(--ink);
    padding:24px 14px 60px;
    display:flex;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 2px, transparent 2px);
    background-size: 26px 26px;
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    width:100%;
    max-width:460px;
    position:relative;
    z-index:1;
  }
  .card-outer{
    background: linear-gradient(160deg, #ffe680, var(--poke-yellow) 55%, #f0b90b);
    border-radius:20px;
    padding:5px;
    box-shadow:
      0 0 0 3px var(--ink),
      0 20px 45px rgba(0,0,0,0.55);
  }
  .card-inner{
    background: linear-gradient(180deg, var(--cream), #fff 60%);
    border-radius:16px;
    border:4px solid var(--ink);
    padding:20px 18px 24px;
    position:relative;
  }
  header{
    text-align:center;
    margin-bottom:14px;
  }
  .poke-icon{
    font-size:44px;
    line-height:1;
    filter:drop-shadow(0 3px 2px rgba(0,0,0,0.3));
  }
  h1{
    font-family:'Press Start 2P', cursive;
    font-size:17px;
    line-height:1.6;
    margin:10px 0 6px;
    color:var(--poke-blue);
    -webkit-text-stroke: 1px var(--ink);
    text-shadow:2px 2px 0 var(--poke-yellow);
  }
  .subtitle{
    font-size:13px;
    font-weight:600;
    color:var(--poke-red-dark);
    opacity:0.9;
  }
  .badge-row{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:8px 0 4px;
    font-size:11px;
    color:var(--poke-blue-dark);
    font-weight:800;
    letter-spacing:1px;
    font-family:'Press Start 2P', cursive;
  }
  .card{
    background:#fff;
    border:3px solid var(--poke-blue);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    box-shadow: inset 0 0 0 2px rgba(59,76,202,0.08);
  }
  .field{
    margin-bottom:12px;
  }
  .field:last-child{margin-bottom:0;}
  label{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:800;
    color:var(--poke-red-dark);
    margin-bottom:5px;
  }
  .flag{font-size:16px;}
  input[type="text"], input[type="number"]{
    width:100%;
    padding:10px 12px;
    font-size:18px;
    font-weight:700;
    border-radius:10px;
    border:2px solid var(--poke-blue);
    background:var(--cream);
    color:var(--ink);
    font-family:'Heebo', sans-serif;
    outline:none;
    transition:box-shadow .15s;
  }
  input:focus{
    box-shadow:0 0 0 3px rgba(255,203,5,0.6);
    border-color:var(--poke-yellow-dark);
  }
  .swap-row{
    display:flex;
    justify-content:center;
    margin:2px 0 10px;
  }
  .pokeball-btn{
    position:relative;
    width:46px;
    height:46px;
    border-radius:50%;
    cursor:pointer;
    border:3px solid var(--ink);
    background:
      linear-gradient(180deg, var(--poke-red) 0 48%, var(--ink) 48% 52%, #fff 52% 100%);
    box-shadow:0 3px 0 var(--ink);
    transition:transform .1s;
    padding:0;
  }
  .pokeball-btn::after{
    content:"";
    position:absolute;
    top:50%;left:50%;
    width:14px;height:14px;
    background:#fff;
    border:3px solid var(--ink);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }
  .pokeball-btn:active{
    transform:translateY(2px) rotate(25deg);
    box-shadow:0 1px 0 var(--ink);
  }
  .rate-line{
    text-align:center;
    font-size:12px;
    font-weight:700;
    color:var(--poke-blue-dark);
    background:rgba(255,203,5,0.35);
    border:1px dashed var(--poke-blue);
    border-radius:10px;
    padding:6px 8px;
    margin-top:8px;
  }
  .rate-line input{
    width:80px;
    display:inline-block;
    padding:2px 6px;
    font-size:12px;
    text-align:center;
    margin:0 4px;
  }
  .discount-toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:10px;
  }
  .discount-toggle label{margin:0;}
  .switch{
    position:relative;
    width:46px;
    height:26px;
    flex-shrink:0;
  }
  .switch input{opacity:0;width:0;height:0;}
  .slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#cfd6f5;
    border:2px solid var(--ink);
    border-radius:20px;
    transition:.2s;
  }
  .slider::before{
    content:"";
    position:absolute;
    height:16px;width:16px;
    left:3px;top:3px;
    background:#fff;
    border-radius:50%;
    transition:.2s;
  }
  .switch input:checked + .slider{background:var(--poke-red);}
  .switch input:checked + .slider::before{transform:translateX(20px);}
  .discount-body{
    display:none;
  }
  .discount-body.show{display:block;}
  .result-box{
    text-align:center;
    background:linear-gradient(135deg, var(--poke-blue), var(--poke-blue-dark));
    color:var(--poke-yellow);
    border-radius:14px;
    padding:14px;
    margin-top:10px;
    border:2px solid var(--ink);
  }
  .result-box .orig{
    font-size:12px;
    text-decoration:line-through;
    color:#c6cdf2;
    margin-bottom:2px;
  }
  .result-box .final{
    font-size:22px;
    font-weight:800;
  }
  .result-box .save{
    font-size:11px;
    color:var(--poke-yellow);
    opacity:0.9;
    margin-top:2px;
  }
  footer{
    text-align:center;
    font-size:11px;
    color:var(--poke-blue-dark);
    opacity:0.75;
    margin-top:6px;
  }
  .zap{
    text-align:center;
    font-size:20px;
    margin-top:2px;
    opacity:0.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card-outer">
    <div class="card-inner">
      <header>
        <div class="poke-icon">⚡🟡</div>
        <h1>ממיר<br>שקל ⇄ יין</h1>
        <div class="badge-row">GOTTA CONVERT 'EM ALL</div>
        <div class="subtitle">שקל ישראלי (₪) ⇄ יין יפני (¥)</div>
      </header>

      <div class="card">
        <div class="field" id="fieldIls">
          <label><span class="flag">🇮🇱</span> שקלים (ILS)</label>
          <input type="text" id="ilsInput" inputmode="decimal" placeholder="0" value="100">
        </div>

        <div class="swap-row">
          <button class="pokeball-btn" id="swapBtn" title="החלף ערכים ומיקומים"></button>
        </div>

        <div class="field" id="fieldJpy">
          <label><span class="flag">🇯🇵</span> ין יפני (JPY)</label>
          <input type="text" id="jpyInput" inputmode="decimal" placeholder="0">
        </div>

        <div class="rate-line" id="rateLine">
          1 ₪ = <input type="number" id="rateInput" value="54" step="0.01"> ¥ (שער לעריכה)
        </div>
      </div>

      <div class="card">
        <div class="discount-toggle">
          <label>⚡ הוסף הנחה באחוזים</label>
          <label class="switch">
            <input type="checkbox" id="discountToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="discount-body" id="discountBody">
          <div class="field">
            <label>אחוז הנחה (%)</label>
            <input type="text" id="discountInput" inputmode="decimal" placeholder="0" value="10">
          </div>

          <div class="result-box" id="resultBox">
            <div class="orig" id="origLine">מחיר מקורי: ₪0 / ¥0</div>
            <div class="final" id="finalLine">₪0 / ¥0</div>
            <div class="save" id="saveLine">חסכת: ₪0 / ¥0</div>
          </div>
        </div>
      </div>

      <div class="zap">⚡ 🔴 ⚡</div>
      <footer>השער ברירת המחדל הוא קירוב — עדכן לפי הצורך</footer>
    </div>
  </div>
</div>

<script>
const ilsInput = document.getElementById('ilsInput');
const jpyInput = document.getElementById('jpyInput');
const rateInput = document.getElementById('rateInput');
const swapBtn = document.getElementById('swapBtn');
const discountToggle = document.getElementById('discountToggle');
const discountBody = document.getElementById('discountBody');
const discountInput = document.getElementById('discountInput');
const origLine = document.getElementById('origLine');
const finalLine = document.getElementById('finalLine');
const saveLine = document.getElementById('saveLine');

function parseNum(str){
  if(!str) return 0;
  const cleaned = String(str).replace(/,/g,'').trim();
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

function fmt(num, maxDecimals=2){
  if(!isFinite(num)) return '0';
  return num.toLocaleString('en-US', {
    minimumFractionDigits: 0,
    maximumFractionDigits: maxDecimals
  });
}

function getRate(){
  const r = parseFloat(rateInput.value);
  return (isNaN(r) || r <= 0) ? 54 : r;
}

function recalcFromIls(){
  const ils = parseNum(ilsInput.value);
  const rate = getRate();
  const jpy = ils * rate;
  jpyInput.value = fmt(jpy, 0);
  updateDiscount();
}

function recalcFromJpy(){
  const jpy = parseNum(jpyInput.value);
  const rate = getRate();
  const ils = rate === 0 ? 0 : jpy / rate;
  ilsInput.value = fmt(ils, 2);
  updateDiscount();
}

function updateDiscount(){
  if(!discountToggle.checked) return;
  const pct = parseNum(discountInput.value);
  const ils = parseNum(ilsInput.value);
  const jpy = parseNum(jpyInput.value);
  const factor = Math.max(0, 1 - (pct/100));
  const finalIls = ils * factor;
  const finalJpy = jpy * factor;
  const saveIls = ils - finalIls;
  const saveJpy = jpy - finalJpy;

  origLine.textContent = `מחיר מקורי: ₪${fmt(ils,2)} / ¥${fmt(jpy,0)}`;
  finalLine.textContent = `₪${fmt(finalIls,2)} / ¥${fmt(finalJpy,0)}`;
  saveLine.textContent = `חסכת: ₪${fmt(saveIls,2)} / ¥${fmt(saveJpy,0)} (${fmt(pct,1)}%)`;
}

ilsInput.addEventListener('input', recalcFromIls);
jpyInput.addEventListener('input', recalcFromJpy);

rateInput.addEventListener('input', ()=>{
  recalcFromIls();
});

// Swap: exchanges the two numbers currently shown in the boxes, AND flips
// which box sits on top vs. bottom, so it really feels like a swap.
const fieldIls = document.getElementById('fieldIls');
const fieldJpy = document.getElementById('fieldJpy');
const swapRow = document.querySelector('.swap-row');
const rateLine = document.getElementById('rateLine');
let ilsOnTop = true;

swapBtn.addEventListener('click', ()=>{
  const ilsRaw = ilsInput.value;
  const jpyRaw = jpyInput.value;
  ilsInput.value = jpyRaw;
  jpyInput.value = ilsRaw;
  updateDiscount();

  ilsOnTop = !ilsOnTop;
  const parent = swapRow.parentNode;
  if(ilsOnTop){
    parent.insertBefore(fieldIls, swapRow);
    parent.insertBefore(fieldJpy, rateLine);
  } else {
    parent.insertBefore(fieldJpy, swapRow);
    parent.insertBefore(fieldIls, rateLine);
  }
});

discountToggle.addEventListener('change', ()=>{
  discountBody.classList.toggle('show', discountToggle.checked);
  updateDiscount();
});

discountInput.addEventListener('input', updateDiscount);

recalcFromIls();
</script>
</body>
</html>
